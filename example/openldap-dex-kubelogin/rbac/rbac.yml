---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dex-users
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dex-users
  namespace: kube-system
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: dex-users
subjects:
- kind: User
  name: oidc:user01
---