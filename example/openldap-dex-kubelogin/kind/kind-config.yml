apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
networking:
  apiServerAddress: "0.0.0.0"
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |-
    group: kubeadm.k8s.io
    version: v1beta1
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
          oidc-issuer-url: https://oidc:31557/dex
          oidc-client-id: kubernetes
          oidc-ca-file: /ssl/ca.pem
          oidc-username-claim: email
          oidc-username-prefix: "oidc:"
      extraVolumes:
      - name: "oidc-ssl"
        hostPath: "/ssl"
        mountPath: "/ssl"
        readOnly: true
        pathType: Directory
  extraMounts:
  - hostPath: ./ssl
    containerPath: /ssl
    readOnly: true
- role: worker
  extraPortMappings:
  - containerPort: 31557
    hostPort: 31557
    listenAddress: "0.0.0.0"
